<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retour vers Patrimoine</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0F172A; color: #E2E8F0;
           display: flex; min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
    .card { background: #1E293B; border-radius: 14px; padding: 28px; max-width: 420px; margin: 16px; }
    h1 { font-size: 18px; margin: 0 0 12px; }
    p { color: #94A3B8; font-size: 14px; line-height: 1.5; }
    a.btn, button { display: block; width: 100%; box-sizing: border-box; text-align: center;
      background: #5B8DEF; color: #fff; border: 0; border-radius: 10px; padding: 13px 16px;
      font-size: 15px; font-weight: 600; text-decoration: none; cursor: pointer; margin-top: 14px; }
    button.alt { background: #26334A; color: #E2E8F0; }
    code { background: #26334A; border-radius: 6px; padding: 2px 6px; font-size: 12px;
           word-break: break-all; display: block; margin-top: 10px; padding: 10px; }
    .err { color: #F87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Retour vers l'application Patrimoine</h1>
    <div id="content"><p>Lecture du code d'autorisation…</p></div>
  </div>
  <script>
    // Page de rebond : la banque redirige ici (Enable Banking exige une URL https),
    // on renvoie le code d'autorisation vers l'app via son schéma patrimoine://.
    (function () {
      var esc = function (s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      };
      var q = new URLSearchParams(location.search);
      var code = q.get('code');
      var state = q.get('state') || '';
      var el = document.getElementById('content');
      if (!code) {
        var error = q.get('error') || 'aucun code reçu';
        el.innerHTML = '<p class="err">Échec de l\'autorisation : ' + esc(error) +
          '</p><p>Fermez cette page et réessayez depuis l\'application.</p>';
        return;
      }
      var appUrl = 'patrimoine://eb-callback?code=' + encodeURIComponent(code) +
                   '&state=' + encodeURIComponent(state);
      el.innerHTML =
        '<p>Autorisation validée ✔</p>' +
        '<a class="btn" href="' + appUrl + '">Ouvrir l\'application Patrimoine</a>' +
        '<button class="alt" id="copy">Copier l\'URL de cette page</button>' +
        '<p>Si le bouton ne fonctionne pas, copiez l\'URL et collez-la dans l\'application ' +
        '(écran Banques françaises → « URL de redirection reçue »).</p>' +
        '<code>' + esc(location.href) + '</code>';
      document.getElementById('copy').addEventListener('click', function () {
        navigator.clipboard.writeText(location.href).then(function () {
          document.getElementById('copy').textContent = 'Copié ✔';
        });
      });
      // Tentative de retour automatique (certains navigateurs l'autorisent sans clic).
      location.href = appUrl;
    })();
  </script>
</body>
</html>
